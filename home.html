<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- daisy ui & tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <main>
        <div class="Parent-div max-w-md mx-auto mt-30 card-body bg-white shadow-xl space-y-4">
            <div class="">
                <img class="mx-auto p-10" src="./assets/github-logo.png" alt="">
                <h1 class="text-center text-3xl font-bold">GitHub Issues Tracker</h1>
                <p class="text-center text-[#64748B]">Sign in to manage your issues</p>
            </div>
            <!-- login form -->
            <div class="flex justify-center mb-0">
                <fieldset class="fieldset rounded-box w-xs p-4">
                    <label class="label">Username</label>
                    <input id="userName" type="text" class="input" placeholder="Enter Username" />
                    <label class="label text-[#4A00FF]">Default: admin</label>

                    <label class="label">Password</label>
                    <input id="password" type="password" class="input" placeholder="Password" />
                    <label class="label text-[#4A00FF]">Default: admin123</label>

                    <button id="loginBtn" class="btn btn-primary mt-4">Login</button>
                </fieldset>
            </div>
            <div class="flex items-center">
                <hr class="flex-1 border-gray-300">
                <span class="px-2 text-gray-500">or</span>
                <hr class="flex-1 border-gray-300">
            </div>
            <p class="text-center text-[#64748B] ">Demo Credentials:</p>
            <div class="bg-[#F8FAFC] p-3 rounded-sm">
                <h2 class="text-center"><span class="font-bold">Username:</span> admin</h2>
                <h2 class="text-center"><span class="font-bold">Password:</span> admin123</h2>
            </div>
        </div>
    </main>

    <script src="./script.js//home.js"></script>
</body>

</html>
