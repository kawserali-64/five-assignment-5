<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>issues Tracker</title>
    <!-- daisy ui & tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font asm -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-[#F8FAFC]">
    <main>

        <header class="p-5 bg-[#FFFFFF]">
            <div class="header-parent ml-6 md:flex justify-between">
                <div class="left-div flex items-center gap-3">
                    <img class="w-12 h-12" src="./assets/github-logo.png" alt="">
                    <p class="text-xl font-bold">GitHub Issues Tracker</p>
                </div>
                <div class="right-div mt-3 md:flex gap-4">

                    <div>
                        <label class="input">
                            <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                    stroke="currentColor">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <path d="m21 21-4.3-4.3"></path>
                                </g>
                            </svg>
                            <input type="search" required placeholder="Search" />
                        </label>
                    </div>
                    <div class="mt-2 md:mt-0 ">
                        <button class="btn btn-primary">Search</button>
                    </div>
                </div>
            </div>
        </header>

        <section class="container w-9/12 mx-auto mt-2">
            <div id="filterBtn" class="bg-[#FFFFFF] p-4 rounded-xl">
                <button onclick="filterIssues('all',this)" class="btn btn-primary">All</button>

                <button onclick="filterIssues('open',this)" class="btn">Open</button>
                <button onclick="filterIssues('closed', this)" class="btn">Closed</button>
            </div>

            <div class="flex flex-col md:flex-row md:justify-between mt-5 gap-4 bg-[#FFFFFF] p-3 rounded-xl">

                <div class="flex gap-2">
                    <img class="w-10 h-10" src="./assets/Aperture.png" alt="">
                    <div>
                        <h1 class="text-xl font-bold">
                            <span id="issueCount">0</span> Issues
                        </h1>

                        <p class="text-[#64748B]">
                            Track and manage your project issues
                        </p>
                    </div>
                </div>

                <div class="flex gap-3">
                    <div class="flex gap-2 items-center">
                        <div class="bg-green-600 w-5 h-5 rounded-full"></div>
                        <p>Open</p>
                    </div>

                    <div class="flex gap-2 items-center">
                        <div class="bg-purple-600 w-5 h-5 rounded-full"></div>
                        <p>Closed</p>
                    </div>
                </div>

            </div>

            <!-- spinner -->
            <div id="spinner" class="flex justify-center items-center mt-8 hidden">
                <span class="loading loading-spinner loading-xl"></span>
            </div>

            <!-- card -->
            <div id="btn-container" class="grid grid-cols-1 md:grid-cols-4 gap-4 card-body shadow-xl">

            </div>

        </section>
        <dialog id="cardModal" class="modal">
            <div class="modal-box">
                <div id="details-container" class="space-y-3">
                </div>

                <div class="modal-action">
                    <form method="dialog">
                        <button class="btn">Close</button>
                    </form>
                </div>
            </div>
        </dialog>
    </main>

    <script src="./script.js/issueTrack.js"></script>
</body>

</html>
