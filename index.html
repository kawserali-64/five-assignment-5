<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- daisy ui & tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font asm -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <main>

        <header class="container mx-auto p-5">
            <div class="header-parent flex justify-between">
                <div class="left-div flex items-center gap-3">
                    <img class="w-12 h-12" src="./assets/github-logo.png" alt="">
                    <p class="text-xl font-bold">GitHub Issues Tracker</p>
                </div>
                <div class="right-div flex gap-4">

                    <div>
                        <label class="input">
                            <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                    stroke="currentColor">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <path d="m21 21-4.3-4.3"></path>
                                </g>
                            </svg>
                            <input type="search" required placeholder="Search" />
                        </label>
                    </div>
                    <div>
                        <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
                    </div>
                </div>

            </div>
        </header>

        <section class="container w-9/12 mx-auto mt-4">
            <div id="filterBtn">
                <button  class="btn btn-primary">All</button>
        
                <button  class="btn">Open</button>
                <button  class="btn">Closed</button>

            </div>

            <div class="flex justify-between mt-8">
                <div class="flex gap-2">
                    <img class="w-10 h-10" src="./assets/Aperture.png" alt="">
                    <div>
                        <h1 class="text-xl font-bold"><span id="issueCount">
                            0
                        </span> Issues</h1>
                        <p class="text-center text-[#64748B]">Track and manage your project issues</p>

                    </div>
                </div>
                <div class="flex gap-3">
                    <div class="flex gap-2 items-center">
                        <div class="bg-green-600 w-5 h-5 rounded-full">
                        </div>
                        <div>
                            <p>Open</p>
                        </div>
                    </div>
                    <div class="flex gap-2 items-center">
                        <div class="bg-purple-600 w-5 h-5 rounded-full">
                        </div>
                        <div>
                            <p>Closed</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- card -->
            <div id="btn-container" class="">
                



            </div>

        </section>


    </main>

    <script src="./script.js/index.js"></script>
</body>

</html>
